name: ForgetMeNot
options:
  bundleIdPrefix: com.lucianlabs
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ForgetMeNot:
    type: application
    platform: iOS
    sources: [ForgetMeNot]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lucianlabs.forgetmenot
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ForgetMeNot/Info.plist
        CODE_SIGN_ENTITLEMENTS: ForgetMeNot/ForgetMeNot.entitlements
        CODE_SIGN_STYLE: Automatic
    info:
      path: ForgetMeNot/Info.plist
      properties:
        UIBackgroundModes: [remote-notification, processing]
        BGTaskSchedulerPermittedIdentifiers: [com.lucianlabs.forgetmenot.refresh]
        UILaunchScreen: {}
  ForgetMeNotTests:
    type: bundle.unit-test
    platform: iOS
    sources: [ForgetMeNotTests]
    dependencies:
      - target: ForgetMeNot
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
